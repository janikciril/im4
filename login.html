<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoomCheck Login</title>
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="login-card" aria-labelledby="login-title">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path
              d="M3.75 11.5L12 4.5l8.25 7v7.25a1.5 1.5 0 0 1-1.5 1.5H5.25a1.5 1.5 0 0 1-1.5-1.5V11.5z"
            />
            <path d="M9.5 20.25v-5h5v5" />
          </svg>
        </div>
        <h1 id="login-title">RoomCheck</h1>
        <p class="subtitle">Sign in to continue</p>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">E-Mail</label>
            <input
              type="email"
              id="email"
              placeholder="your@email.com"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-field">
              <input
                type="password"
                id="password"
                placeholder="........"
                autocomplete="current-password"
                required
              />
              <button type="button" class="password-toggle" aria-label="Show password">
                👁
              </button>
            </div>
          </div>
          <div class="row-options">
            <label class="remember">
              <input type="checkbox" id="rememberMe" />
              <span>Stay signed in</span>
            </label>
            <a href="#" class="muted-link">Forgot password?</a>
          </div>
          <button type="submit" class="submit-btn">Sign in</button>
        </form>

        <p class="register-text">
          No account yet?
          <a href="register.html">Create one now</a>
        </p>
      </section>
    </main>

    <script src="js/login.js"></script>
  </body>
</html>
