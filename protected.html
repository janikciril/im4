<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protected Page</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="mobile-shell">
      <section class="card hero">
        <h1>Protected Page</h1>
        <p>This content is available only after a successful login.</p>
      </section>

      <section class="card" id="protectedContent">
        <h2>Welcome back</h2>
        <div class="protected-grid">
          <div class="info-block">
            <span class="info-label">E-Mail</span>
            <span class="info-value" id="userEmail">Loading...</span>
          </div>
          <div class="info-block">
            <span class="info-label">User ID</span>
            <span class="info-value" id="userId">Loading...</span>
          </div>
        </div>
      </section>

      <section class="card">
        <button id="logoutBtn" class="logout-btn">Logout</button>
      </section>
    </main>

    <script src="js/protected.js"></script>
    <script src="js/logout.js"></script>
  </body>
</html>
